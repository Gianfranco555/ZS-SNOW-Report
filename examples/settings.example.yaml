# "title" is the main title of the report.
title: "Zscaler Incident Report"

# "branding" allows for customization of the report's appearance.
branding:
  # "logo_path" is the path to the company logo.
  # This is optional; if not provided, no logo will be displayed.
  # The path can be relative to the project root.
  logo_path: "./brand/logo.png"
  # "footer" is the text that appears at the bottom of the report.
  # This is optional; if not provided, no footer will be displayed.
  footer: "Confidential – Zscaler Operations"

# "style" defines the color palette and fonts for the report.
style:
  # "palette" sets the colors used in the report.
  palette:
    primary: "#2F6FE4"
    secondary: "#6C757D"
    accent: "#F4B400"
    muted: "#D0D3D4"
    # "categorical" is a list of colors for charts.
    categorical: ["#2F6FE4","#00A1D6","#7CB342","#F4B400","#E67E22","#8E44AD","#C0392B"]
  # "font_family" specifies the font to be used in the report.
  font_family: "Inter, Arial, sans-serif"

# "layout" controls which sections of the report are displayed.
layout:
  # "show_resolution_codes_chart" toggles the visibility of the resolution codes chart.
  show_resolution_codes_chart: true
  # "show_top_tags_chart" toggles the visibility of the top tags chart.
  show_top_tags_chart: true
